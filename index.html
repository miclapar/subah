<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI Clapar Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        .hero-bg { background: linear-gradient(rgba(6, 95, 70, 0.9), rgba(5, 150, 105, 0.95)), url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1000&q=80'); background-size: cover; background-position: center; }
        
        .nav-item { transition: all 0.3s ease; color: #94a3b8; }
        .nav-item.active[data-menu="home"] { color: #10b981; }
        .nav-item.active[data-menu="materi"] { color: #3b82f6; }
        .nav-item.active[data-menu="wali"] { color: #f59e0b; }
        .nav-item.active[data-menu="profil"] { color: #8b5cf6; }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
        
        @keyframes scroll-gallery { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-scroll { display: flex; width: max-content; animation: scroll-gallery 35s linear infinite; }
        
        .gallery-item { flex-shrink: 0; width: 180px; height: 110px; margin-right: 15px; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .pulse-btn { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        /* Custom Scrollbar untuk Agenda */
        #agenda-list::-webkit-scrollbar { width: 4px; }
        #agenda-list::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>

    <section class="hero-bg pb-28 pt-8 px-6 rounded-b-[60px] shadow-2xl relative overflow-hidden text-center">
        <div class="max-w-4xl mx-auto mb-6 overflow-hidden bg-white/10 backdrop-blur-md border border-white/20 rounded-full py-2 px-5 relative z-10">
            <div id="marquee-info" class="animate-marquee text-[10px] font-bold text-white tracking-widest uppercase">Memuat kabar madrasah...</div>
        </div>

        <nav class="flex justify-between items-center max-w-4xl mx-auto mb-10 relative z-10 text-left">
            <div class="flex items-center gap-4">
                <img src="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png" class="w-14 h-14 bg-white p-1 rounded-2xl shadow-lg">
                <h1 class="text-white font-extrabold text-xl leading-none tracking-tight">MI CLAPAR</h1>
            </div>
            <button onclick="triggerVibrate(100)" class="bg-white/20 p-3 rounded-2xl text-white backdrop-blur-md border border-white/30"><i class="fas fa-bell"></i></button>
        </nav>

        <div class="max-w-4xl mx-auto relative z-10">
            <div class="bg-white p-6 rounded-[35px] shadow-2xl border border-emerald-100">
                <div class="flex items-center justify-between mb-5 px-1">
                    <h4 class="font-extrabold text-slate-800 text-sm uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-user-shield text-emerald-600"></i> Pantauan Orang Tua
                    </h4>
                    <span class="text-[10px] font-black text-white bg-emerald-500 px-3 py-1 rounded-full shadow-sm animate-pulse">LIVE UPDATE</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-emerald-50/70 p-5 rounded-[28px] border border-emerald-100 text-center relative overflow-hidden">
                        <p class="text-[10px] text-emerald-700 font-extrabold uppercase mb-2">Kehadiran</p>
                        <p id="absen-val" class="text-3xl font-black text-slate-800 leading-none tracking-tighter">--%</p>
                    </div>
                    <div class="bg-emerald-50/70 p-5 rounded-[28px] border border-emerald-100 text-center relative overflow-hidden">
                        <p class="text-[10px] text-emerald-700 font-extrabold uppercase mb-2">Hafalan</p>
                        <p id="hafalan-val" class="text-sm font-black text-slate-800 leading-tight">...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-6 -mt-10 relative z-20 pb-32">
        <div class="grid grid-cols-4 gap-4 mb-10 text-center">
            <button onclick="actionMenu('Absen', 50)" class="flex flex-col items-center">
                <div class="bg-emerald-500 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-white active:scale-90 transition border-b-4 border-emerald-700"><i class="fas fa-calendar-check text-xl"></i></div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Absen</span>
            </button>
            <button onclick="actionMenu('Nilai', 50)" class="flex flex-col items-center">
                <div class="bg-blue-500 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-white active:scale-90 transition border-b-4 border-blue-700"><i class="fas fa-star text-xl"></i></div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Nilai</span>
            </button>
            <button onclick="actionMenu('Info', 50)" class="flex flex-col items-center">
                <div class="bg-amber-500 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-white active:scale-90 transition border-b-4 border-amber-700"><i class="fas fa-newspaper text-xl"></i></div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Info</span>
            </button>
            <button onclick="bukaHalamanVideo()" class="flex flex-col items-center">
    <div class="bg-red-500 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-white active:scale-90 transition border-b-4 border-red-700">
        <i class="fas fa-play text-xl"></i>
    </div>
    <span class="text-[10px] font-bold mt-2 text-slate-600 uppercase tracking-wide">Video</span>
</button>
        </div>

        <h3 class="font-extrabold text-slate-800 text-sm mb-4 px-1 uppercase tracking-widest">📸 Kegiatan Madrasah</h3>
        <div class="gallery-container overflow-hidden rounded-[30px] bg-white p-3 mb-10 shadow-sm border border-slate-100">
            <div id="gallery-wrapper" class="animate-scroll"></div>
            <div class="bg-white rounded-[35px] p-6 shadow-sm border border-slate-100 mb-10">
            <div class="flex items-center justify-between mb-4 px-1">
                <h4 class="font-extrabold text-slate-800 text-sm uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-calendar-check text-emerald-500"></i> Agenda Terdekat
                </h4>
                <span class="text-[10px] font-bold text-slate-400">Scroll untuk lainnya</span>
            </div>
            <div id="agenda-list" class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                <p class="text-[11px] text-slate-400 animate-pulse text-center py-4">Menyiapkan jadwal...</p>
            </div>
        </div>
        </div>
    </main>

    <div id="pwa-popup" class="fixed bottom-28 left-4 right-4 z-[100] hidden">
        <div class="bg-slate-900/95 backdrop-blur-lg text-white p-5 rounded-[30px] shadow-2xl flex items-center justify-between border border-white/10 animate__animated animate__bounceInUp">
            <div class="flex items-center gap-3">
                <img src="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png" class="w-10 h-10 bg-white p-1 rounded-xl shadow-lg">
                <div><h5 class="text-sm font-bold leading-none">Instal Aplikasi</h5><p class="text-[10px] text-emerald-400 mt-1">Akses cepat layar utama</p></div>
            </div>
            <button id="pwa-install" class="bg-emerald-500 px-5 py-2 rounded-xl text-xs font-black active:scale-95 transition">PASANG</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-2xl border-t border-slate-200 px-6 py-4 flex justify-between items-center z-50 rounded-t-[45px] shadow-2xl">
        <button onclick="changeMenu(this, 'home')" data-menu="home" class="nav-item active flex flex-col items-center"><i class="fas fa-house-user text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Beranda</span></button>
        <button onclick="changeMenu(this, 'materi')" data-menu="materi" class="nav-item flex flex-col items-center"><i class="fas fa-graduation-cap text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Materi</span></button>
        <div onclick="triggerVibrate(80); alert('Scan Absensi')" class="bg-emerald-600 w-16 h-16 rounded-full flex items-center justify-center text-white shadow-2xl -mt-16 border-[8px] border-slate-100 pulse-btn active:scale-90 transition cursor-pointer"><i class="fas fa-qrcode text-2xl"></i></div>
        <button onclick="changeMenu(this, 'wali')" data-menu="wali" class="nav-item flex flex-col items-center"><i class="fas fa-hand-holding-heart text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Layanan</span></button>
        <button onclick="changeMenu(this, 'profil')" data-menu="profil" class="nav-item flex flex-col items-center"><i class="fas fa-user-shield text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Profil</span></button>
    </div>

    <script>
        const API = {
            info: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=942260017&single=true&output=csv',
            akad: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1892437284&single=true&output=csv',
            gale: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1377707417&single=true&output=csv',
            agenda: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1165613959&single=true&output=csv'
        };

        async function init() {
            try {
                const [info, akad, gale, agenda] = await Promise.all([
                    fetch(API.info).then(r => r.text()),
                    fetch(API.akad).then(r => r.text()),
                    fetch(API.gale).then(r => r.text()),
                    fetch(API.agenda).then(r => r.text())
                ]);

                // Info Marquee
                const infoRows = info.split('\n').slice(1);
                document.getElementById('marquee-info').innerHTML = infoRows.filter(r => r.includes('Aktif')).map(r => r.split(',')[2]).join(' • ') || "Portal MI Clapar Digital";

                // Monitoring
                const akadRow = akad.split('\n')[1]?.split(',');
                if(akadRow) {
                    document.getElementById('absen-val').innerText = (akadRow[3] || '98') + '%';
                    document.getElementById('hafalan-val').innerText = akadRow[4] || 'Update...';
                }

                // Galeri
                const galeRows = gale.split('\n').slice(1);
                const gHtml = galeRows.map(r => {
                    const u = r.split(',')[3]?.trim();
                    return u ? `<div class="gallery-item"><img src="${u}" class="w-full h-full object-cover"></div>` : '';
                }).join('');
                document.getElementById('gallery-wrapper').innerHTML = gHtml + gHtml;

                // Agenda Render
                const agendaRows = agenda.split('\n').slice(1);
                let aHtml = "";
                agendaRows.forEach(row => {
                    const c = row.split(',');
                    if(c[1] && c[1].trim() !== "") { 
                        aHtml += `
                            <div class="flex items-center gap-3 bg-emerald-50/40 p-2.5 rounded-2xl border border-emerald-100/50">
                                <div class="bg-white border border-emerald-200 text-emerald-700 font-black px-2 py-1 rounded-xl text-[12px] min-w-[50px] text-center shadow-sm">${c[0]}</div>
                                <div class="flex-1">
                                    <h5 class="text-slate-700 text-[13px] font-extrabold leading-none">${c[1]}</h5>
                                    <p class="text-[12px] text-slate-500 mt-1 font-medium italic">${c[2] || 'Kegiatan Madrasah'}</p>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('agenda-list').innerHTML = aHtml || "<p class='text-[11px] text-center text-slate-400'>Belum ada agenda.</p>";

            } catch (e) { console.error("Error data"); }
        }

        // PWA LOGIC
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            setTimeout(() => { document.getElementById('pwa-popup').classList.remove('hidden'); }, 3000);
        });

        document.getElementById('pwa-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('pwa-popup').classList.add('hidden');
            }
        });

        function triggerVibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
        function actionMenu(name, v) { triggerVibrate(v); alert('Membuka ' + name); }
        function changeMenu(btn, type) {
            triggerVibrate(30);
            document.querySelectorAll('.nav-item').forEach(i => { i.classList.remove('active'); i.style.color = "#94a3b8"; });
            btn.classList.add('active');
            const colors = { home: '#10b981', materi: '#3b82f6', wali: '#f59e0b', profil: '#8b5cf6' };
            btn.style.color = colors[type];
        }

        init();
    </script>
</body>
</html>
