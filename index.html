<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI Clapar Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hero-bg { background: linear-gradient(rgba(6, 95, 70, 0.85), rgba(5, 150, 105, 0.95)), url('https://images.unsplash.com/photo-1577891772227-d263f5e3c960?auto=format&fit=crop&w=1000&q=80'); background-size: cover; }
        
        /* Navigasi Warna */
        .nav-item { color: #94a3b8; transition: 0.3s; }
        .nav-item.active[data-menu="home"] { color: #10b981; }
        .nav-item.active[data-menu="materi"] { color: #3b82f6; }
        .nav-item.active[data-menu="wali"] { color: #f59e0b; }
        .nav-item.active[data-menu="profil"] { color: #8b5cf6; }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; }
    </style>
</head>
<body>

    <section class="hero-bg pb-20 pt-8 px-6 rounded-b-[40px] shadow-lg relative">
        <nav class="flex justify-between items-center max-w-4xl mx-auto mb-8 relative z-10">
            <div class="flex items-center gap-3">
                <img src="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png" class="w-10 h-10 bg-white/20 p-1 rounded-xl">
                <h1 class="text-white font-bold text-lg">MI CLAPAR</h1>
            </div>
            <div class="bg-white/10 p-2 rounded-xl text-white text-xs uppercase font-bold tracking-widest">Digital</div>
        </nav>

        <div class="max-w-4xl mx-auto glass-card bg-white/90 backdrop-blur-md p-5 rounded-[30px] shadow-xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><i class="fas fa-user-graduate"></i></div>
                <div><h4 class="font-bold text-slate-800 text-sm leading-none">Dashboard Siswa</h4><p class="text-[10px] text-slate-500 mt-1">Status Kehadiran & Hafalan</p></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100 text-center">
                    <p id="absen-val" class="text-lg font-extrabold text-emerald-700 leading-none">--%</p>
                    <p class="text-[8px] text-emerald-500 font-bold uppercase mt-1">Absensi</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100 text-center">
                    <p id="hafalan-val" class="text-lg font-extrabold text-blue-700 leading-none">...</p>
                    <p class="text-[8px] text-blue-500 font-bold uppercase mt-1">Hafalan</p>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-6 -mt-8 relative z-20 pb-32">
        <div class="grid grid-cols-4 gap-3 mb-8">
            <button onclick="nav('Absen')" class="flex flex-col items-center">
                <div class="bg-emerald-100 w-14 h-14 rounded-2xl shadow-sm flex items-center justify-center text-emerald-600 border border-emerald-200 active:scale-95 transition">
                    <i class="fas fa-calendar-check text-xl"></i>
                </div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Absen</span>
            </button>
            
            <button onclick="nav('Nilai')" class="flex flex-col items-center">
                <div class="bg-blue-100 w-14 h-14 rounded-2xl shadow-sm flex items-center justify-center text-blue-600 border border-blue-200 active:scale-95 transition">
                    <i class="fas fa-file-signature text-xl"></i>
                </div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Nilai</span>
            </button>
            
            <button onclick="nav('Info')" class="flex flex-col items-center">
                <div class="bg-amber-100 w-14 h-14 rounded-2xl shadow-sm flex items-center justify-center text-amber-600 border border-amber-200 active:scale-95 transition">
                    <i class="fas fa-bullhorn text-xl"></i>
                </div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Info</span>
            </button>
            
            <button onclick="nav('Infaq')" class="flex flex-col items-center">
                <div class="bg-purple-100 w-14 h-14 rounded-2xl shadow-sm flex items-center justify-center text-purple-600 border border-purple-200 active:scale-95 transition">
                    <i class="fas fa-hand-holding-heart text-xl"></i>
                </div>
                <span class="text-[10px] font-bold mt-2 text-slate-600">Infaq</span>
            </button>
        </div>

        <div class="bg-white rounded-[30px] p-5 shadow-sm border border-slate-100 mb-6">
            <h4 class="font-extrabold text-slate-800 mb-4 text-sm uppercase tracking-wider">Agenda Terdekat</h4>
            <div id="agenda-list" class="space-y-3">
                <p class="text-xs text-slate-400">Memuat agenda...</p>
            </div>
        </div>

        <h4 class="font-extrabold text-slate-800 mb-3 px-1 text-sm uppercase tracking-wider">Kegiatan Madrasah</h4>
        <div class="overflow-hidden rounded-2xl">
            <div id="gallery-wrapper" class="flex gap-2 animate-marquee py-2"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-slate-100 px-6 py-3 flex justify-between items-center z-50 rounded-t-[35px] shadow-2xl">
        <button onclick="changeMenu(this, 'home')" data-menu="home" class="nav-item active flex flex-col items-center"><i class="fas fa-house-chimney text-lg"></i><span class="text-[8px] font-extrabold mt-1">HOME</span></button>
        <button onclick="changeMenu(this, 'materi')" data-menu="materi" class="nav-item flex flex-col items-center"><i class="fas fa-book-open text-lg"></i><span class="text-[8px] font-extrabold mt-1">MATERI</span></button>
        <div class="bg-emerald-600 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg -mt-10 border-4 border-slate-50"><i class="fas fa-qrcode text-lg"></i></div>
        <button onclick="changeMenu(this, 'wali')" data-menu="wali" class="nav-item flex flex-col items-center"><i class="fas fa-users-viewfinder text-lg"></i><span class="text-[8px] font-extrabold mt-1">WALI</span></button>
        <button onclick="changeMenu(this, 'profil')" data-menu="profil" class="nav-item flex flex-col items-center"><i class="fas fa-circle-user text-lg"></i><span class="text-[8px] font-extrabold mt-1">PROFIL</span></button>
    </div>

    <script>
        const SHEETS = {
            info: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=942260017&single=true&output=csv',
            akad: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1892437284&single=true&output=csv',
            gale: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1377707417&single=true&output=csv'
        };

        async function init() {
            try {
                const [info, akad, gale] = await Promise.all([
                    fetch(SHEETS.info).then(r => r.text()),
                    fetch(SHEETS.akad).then(r => r.text()),
                    fetch(SHEETS.gale).then(r => r.text())
                ]);

                // Agenda
                const agendaRows = info.split('\n').slice(1);
                let agendaHtml = "";
                agendaRows.forEach(r => {
                    const c = r.split(',');
                    if(c[3]?.includes('Aktif')) {
                        agendaHtml += `<div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <div class="bg-white px-2 py-1 rounded-lg shadow-sm text-[10px] font-bold text-emerald-600">${c[0]}</div>
                            <p class="text-xs font-bold text-slate-700">${c[2]}</p>
                        </div>`;
                    }
                });
                document.getElementById('agenda-list').innerHTML = agendaHtml || "Tidak ada agenda.";

                // Akademik
                const akadData = akad.split('\n')[1]?.split(',');
                if(akadData) {
                    document.getElementById('absen-val').innerText = akadData[3] + '%';
                    document.getElementById('hafalan-val').innerText = akadData[4];
                }

                // Galeri
                const galeHtml = gale.split('\n').slice(1).map(r => {
                    const u = r.split(',')[3]?.trim();
                    return u ? `<img src="${u}" class="w-40 h-24 object-cover rounded-xl shadow-sm">` : '';
                }).join('');
                document.getElementById('gallery-wrapper').innerHTML = galeHtml + galeHtml;

            } catch (e) { console.error("Error data"); }
        }

        function nav(name) {
            if(navigator.vibrate) navigator.vibrate(50);
            alert("Membuka menu " + name);
        }

        function changeMenu(btn, type) {
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active');
                i.style.color = "#94a3b8";
            });
            btn.classList.add('active');
            const colors = { home: '#10b981', materi: '#3b82f6', wali: '#f59e0b', profil: '#8b5cf6' };
            btn.style.color = colors[type];
        }

        init();
    </script>
</body>
</html>
