<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI Clapar Digital | Portal Orang Tua & Guru</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .hero-bg { background: linear-gradient(rgba(6, 95, 70, 0.8), rgba(5, 150, 105, 0.9)), url('https://images.unsplash.com/photo-1577891772227-d263f5e3c960?auto=format&fit=crop&w=1000&q=80'); background-size: cover; background-position: center; }
        
        /* Marquee */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; white-space: nowrap; }
        
        @keyframes scroll-gallery { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-scroll { display: flex; width: max-content; animation: scroll-gallery 30s linear infinite; }
        
        .gallery-item { flex-shrink: 0; width: 160px; height: 100px; margin-right: 12px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #eee; }
        .pulse-btn { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .nav-item.active { color: #10b981; }
    </style>
</head>
<body>

    <section class="hero-bg pb-24 pt-8 px-6 rounded-b-[50px] shadow-2xl relative overflow-hidden">
        <div class="max-w-4xl mx-auto mb-6 overflow-hidden bg-white/10 backdrop-blur-sm border border-white/20 rounded-full py-2 px-4 relative z-10">
            <div id="marquee-info" class="animate-marquee text-[10px] font-bold text-emerald-100 tracking-wider uppercase">
                Menyambungkan ke sistem...
            </div>
        </div>

        <nav class="flex justify-between items-center max-w-4xl mx-auto mb-10 relative z-10">
            <div class="flex items-center gap-3">
                <img src="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png" class="w-12 h-12 bg-white/20 p-1 rounded-2xl">
                <div>
                    <h1 class="text-white font-extrabold text-xl leading-none">MI CLAPAR</h1>
                    <p class="text-emerald-200 text-[10px] tracking-[0.3em] font-semibold uppercase mt-1">Subah - Batang</p>
                </div>
            </div>
            <button onclick="requestNotificationPermission()" class="bg-white/10 p-3 rounded-2xl text-white"><i class="fas fa-bell"></i></button>
        </nav>

        <div class="max-w-4xl mx-auto relative z-10">
            <h2 class="text-3xl font-extrabold text-white mb-4 leading-tight">Selamat Datang di <br><span class="text-emerald-300">Madrasah Digital</span></h2>
            <div class="glass-card p-5 rounded-[32px] shadow-2xl mt-6">
                <div class="flex items-center gap-4 mb-4">
                    <img src="https://ui-avatars.com/api/?name=Siswa+MI&background=059669&color=fff" class="w-14 h-14 rounded-2xl border-2 border-emerald-500">
                    <div>
                        <h4 class="font-bold text-slate-800">Halo, Orang Tua Siswa</h4>
                        <p class="text-xs text-slate-500 italic">Info akademik terbaru</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-emerald-50 p-3 rounded-2xl text-center">
                        <p class="text-[10px] text-emerald-600 font-bold uppercase">Kehadiran</p>
                        <p id="absen-val" class="text-sm font-bold text-emerald-900">--%</p>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-2xl text-center">
                        <p class="text-[10px] text-blue-600 font-bold uppercase">Hafalan</p>
                        <p id="hafalan-val" class="text-sm font-bold text-blue-900">Memuat...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-6 -mt-10 relative z-20 pb-32">
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="flex flex-col items-center"><div class="bg-white w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-emerald-600 border border-emerald-50"><i class="fas fa-calendar-check text-xl"></i></div><span class="text-[10px] font-bold mt-2">Absen</span></div>
            <div class="flex flex-col items-center"><div class="bg-white w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-blue-600 border border-blue-50"><i class="fas fa-file-invoice text-xl"></i></div><span class="text-[10px] font-bold mt-2">Nilai</span></div>
            <div class="flex flex-col items-center"><div class="bg-white w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-amber-500 border border-amber-50"><i class="fas fa-bullhorn text-xl"></i></div><span class="text-[10px] font-bold mt-2">Info</span></div>
            <div class="flex flex-col items-center"><div class="bg-white w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center text-purple-600 border border-purple-50"><i class="fas fa-hand-holding-heart text-xl"></i></div><span class="text-[10px] font-bold mt-2">Donasi</span></div>
        </div>

        <h3 class="font-extrabold text-slate-800 text-lg mb-4 flex items-center gap-2"><i class="fas fa-camera-retro text-emerald-500"></i> Kegiatan Madrasah</h3>
        <div class="gallery-container overflow-hidden mb-8 relative rounded-2xl">
            <div id="gallery-wrapper" class="animate-scroll"></div>
        </div>

        <div class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100">
            <h4 class="font-extrabold text-slate-800 mb-4">Agenda Terdekat</h4>
            <div id="agenda-list" class="space-y-4">
                <p class="text-xs text-slate-400">Mencari agenda...</p>
            </div>
        </div>
    </main>

    <div id="pwa-popup" class="fixed bottom-24 left-4 right-4 z-[100] hidden">
        <div class="bg-slate-900/95 backdrop-blur-lg text-white p-5 rounded-[30px] shadow-2xl flex items-center justify-between border border-white/10 animate__animated animate__bounceInUp">
            <div class="flex items-center gap-3">
                <img src="https://ik.imagekit.io/qusnzijssq/logo%20miclapar.png" class="w-10 h-10 bg-white p-1 rounded-xl">
                <div><h5 class="text-sm font-bold">Aplikasi Digital</h5><p class="text-[10px] text-emerald-400">Instal di layar utama</p></div>
            </div>
            <button id="pwa-install" class="bg-emerald-500 px-4 py-2 rounded-xl text-xs font-bold">INSTALL</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-6 py-3 flex justify-between items-center z-50 rounded-t-[30px] shadow-lg">
        <button onclick="changeMenu(this)" class="nav-item active flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-bold mt-1">HOME</span></button>
        <button onclick="changeMenu(this)" class="nav-item text-slate-400 flex flex-col items-center"><i class="fas fa-book-open text-xl"></i><span class="text-[9px] font-bold mt-1">MATERI</span></button>
        <div class="bg-emerald-600 w-14 h-14 rounded-full flex items-center justify-center text-white shadow-lg -mt-12 border-[6px] border-[#f8fafc] pulse-btn active:scale-90 transition"><i class="fas fa-qrcode text-xl"></i></div>
        <button onclick="changeMenu(this)" class="nav-item text-slate-400 flex flex-col items-center"><i class="fas fa-users text-xl"></i><span class="text-[9px] font-bold mt-1">WALI</span></button>
        <button onclick="changeMenu(this)" class="nav-item text-slate-400 flex flex-col items-center"><i class="fas fa-user-circle text-xl"></i><span class="text-[9px] font-bold mt-1">PROFIL</span></button>
    </div>

    <script>
        const SHEETS_INFO = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=942260017&single=true&output=csv';
        const SHEETS_AKADEMIK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1892437284&single=true&output=csv';
        const SHEETS_GALERI = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1377707417&single=true&output=csv';

        async function initApp() {
            try {
                const [info, akad, gale] = await Promise.all([
                    fetch(SHEETS_INFO).then(r => r.text()),
                    fetch(SHEETS_AKADEMIK).then(r => r.text()),
                    fetch(SHEETS_GALERI).then(r => r.text())
                ]);
                renderInfo(info);
                renderAkademik(akad);
                renderGaleri(gale);
                renderAgenda(info); // Agenda menggunakan data dari sheet Info
            } catch (e) { console.error(e); }
        }

        function renderInfo(csv) {
            const rows = csv.split('\n').slice(1);
            let text = rows.filter(r => r.includes('Aktif')).map(r => r.split(',')[2]).join(' • ');
            document.getElementById('marquee-info').innerHTML = text || "Selamat Datang di MI Clapar Digital";
        }

        function renderAgenda(csv) {
            const rows = csv.split('\n').slice(1);
            const list = document.getElementById('agenda-list');
            let html = "";
            rows.forEach(r => {
                const cols = r.split(',');
                if(cols.length > 2 && cols[3]?.trim() === 'Aktif') {
                    // Misal kolom 1 adalah tanggal "15 Mei"
                    html += `
                    <div class="flex items-center gap-4">
                        <div class="bg-emerald-100 text-emerald-700 w-12 h-12 rounded-2xl flex flex-col items-center justify-center">
                            <span class="text-xs font-bold leading-none">${cols[0]}</span>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${cols[2]}</p>
                            <p class="text-[10px] text-slate-500">Klik untuk info detail</p>
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || "<p class='text-xs text-slate-400'>Belum ada agenda aktif.</p>";
        }

        function renderAkademik(csv) {
            const data = csv.split('\n')[1]?.split(',');
            if(data) {
                document.getElementById('absen-val').innerText = (data[3] || '98') + '%';
                document.getElementById('hafalan-val').innerHTML = `${data[4]} <span class="text-[10px] block font-normal text-blue-400">(${data[5]})</span>`;
            }
        }

        function renderGaleri(csv) {
            const rows = csv.split('\n').slice(1);
            const wrapper = document.getElementById('gallery-wrapper');
            let items = rows.map(r => {
                const url = r.split(',')[3]?.trim();
                return url ? `<div class="gallery-item"><img src="${url}" class="w-full h-full object-cover"></div>` : '';
            }).join('');
            wrapper.innerHTML = items + items;
        }

        // PWA & UI
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => document.getElementById('pwa-popup').classList.remove('hidden'), 3000);
        });
        document.getElementById('pwa-install').addEventListener('click', () => {
            if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
        });
        function changeMenu(btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('active', 'text-slate-400'));
            btn.classList.add('active'); btn.classList.remove('text-slate-400');
        }

        initApp();
    </script>
</body>
</html>
