<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Video MI Clapar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'sans-serif'; -webkit-tap-highlight-color: transparent; }
        /* Menghaluskan baris teks judul */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50">

    <div class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100 flex items-center gap-3">
        <a href="index.html" class="w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 active:scale-90 transition">
            <i class="fas fa-arrow-left text-sm"></i>
        </a>
        <div>
            <h2 class="font-black text-slate-800 text-sm leading-none uppercase tracking-tight">Koleksi Video</h2>
            <p class="text-[9px] text-emerald-600 font-bold uppercase mt-1">MI Clapar Digital</p>
        </div>
    </div>

    <div id="video-grid" class="grid grid-cols-3 gap-2 p-2">
        <div class="col-span-3 py-32 text-center" id="loading">
            <i class="fas fa-circle-notch fa-spin text-emerald-500 text-2xl mb-3"></i>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Membuka Arsip Video...</p>
        </div>
    </div>

    <div id="end-of-content" class="py-10 text-center hidden">
        <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Semua video telah dimuat</p>
    </div>

    <script>
        // MASUKKAN LINK CSV GOOGLE SHEETS BAPAK DISINI
        const SHEET_URL = "URL_CSV_GOOGLE_SHEET_BAPAK_DI_SINI";

        async function muatVideo() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                // Ambil semua baris, lewati baris pertama (header)
                const rows = data.split('\n').slice(1);
                
                let html = "";
                rows.forEach(row => {
                    // Gunakan regex untuk memisahkan koma agar aman jika ada koma di dalam judul
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    
                    const url = c[4]?.replace(/"/g, '').trim(); // Kolom E
                    const judul = c[1]?.replace(/"/g, '').trim(); // Kolom B

                    if (url && url.includes('http')) {
                        // Ekstrak ID Video YouTube
                        const videoID = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                        
                        html += `
                        <div class="bg-white rounded-xl overflow-hidden border border-slate-100 shadow-sm active:scale-95 transition-transform duration-200" 
                             onclick="window.open('https://youtube.com/watch?v=${videoID}', '_blank')">
                            <div class="aspect-video relative bg-slate-200">
                                <img src="https://img.youtube.com/vi/${videoID}/mqdefault.jpg" 
                                     class="w-full h-full object-cover" 
                                     loading="lazy">
                                <div class="absolute inset-0 flex items-center justify-center bg-black/5">
                                    <div class="w-7 h-7 bg-white/80 rounded-full flex items-center justify-center shadow">
                                        <i class="fas fa-play text-red-600 text-[10px] ml-0.5"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="p-1.5 bg-white">
                                <p class="text-[8px] font-bold text-slate-600 line-clamp-2 leading-tight uppercase text-center">${judul || 'Video Kegiatan'}</p>
                            </div>
                        </div>`;
                    }
                });

                const grid = document.getElementById('video-grid');
                grid.innerHTML = html || "<p class='col-span-3 text-center py-20 text-xs text-slate-400'>Belum ada video tersedia.</p>";
                document.getElementById('end-of-content').classList.remove('hidden');

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('video-grid').innerHTML = "<p class='col-span-3 text-center py-20 text-red-500 text-[10px]'>Gagal memuat data. Periksa koneksi internet.</p>";
            }
        }

        // Jalankan fungsi
        muatVideo();
    </script>
</body>
</html>
