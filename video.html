<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Video MI Clapar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'sans-serif'; -webkit-tap-highlight-color: transparent; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50">

    <div class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-100 flex items-center justify-between">
    <div class="flex flex-col">
        <h2 class="font-black text-slate-800 text-sm leading-none uppercase tracking-tight">Koleksi Video</h2>
        <p class="text-[9px] text-emerald-600 font-bold uppercase mt-1 tracking-wider">MI Clapar Digital</p>
    </div>

    <a href="index.html" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 text-white active:scale-95 transition shadow-md">
        <span class="text-[10px] font-bold uppercase tracking-widest">Home/kembali</span>
        <i class="fas fa-home text-xs"></i>
    </a>
</div>
            <h2 class="font-black text-slate-800 text-sm leading-none uppercase tracking-tight">Koleksi Video</h2>
            <p class="text-[9px] text-emerald-600 font-bold uppercase mt-1">MI Clapar Digital</p>
        </div>
    </div>

    <div id="video-grid" class="grid grid-cols-3 gap-2 p-2">
        <div class="col-span-3 py-32 text-center" id="loading">
            <i class="fas fa-circle-notch fa-spin text-emerald-500 text-2xl mb-3"></i>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Membuka Galeri...</p>
        </div>
    </div>

    <script>
        // Link CSV yang Bapak berikan
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-ChtIqUlL45D3tHLnDRQ6SX-dkwbxT9Vd-pwGOtNbol_tKRnuYcm88kEqBzBQX1PNq0fE4fo2B0KC/pub?gid=1181413974&single=true&output=csv";

        async function muatVideo() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                // Memecah baris CSV (lewati baris header)
                const rows = data.split('\n').slice(1);
                
                let html = "";
                rows.forEach(row => {
                    // Regex untuk memisahkan koma dengan aman
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    
                    const judul = c[1]?.replace(/"/g, '').trim(); // Judul di kolom B
                    const url = c[4]?.replace(/"/g, '').trim();   // Link YouTube di kolom E

                    if (url && url.includes('http')) {
                        // Mengambil ID Video YouTube (support format watch?v= atau youtu.be/)
                        let videoID = "";
                        if(url.includes('v=')) {
                            videoID = url.split('v=')[1].split('&')[0];
                        } else {
                            videoID = url.split('/').pop();
                        }
                        
                        html += `
                        <div class="bg-white rounded-xl overflow-hidden border border-slate-100 shadow-sm active:scale-95 transition-transform duration-200" 
                             onclick="window.open('https://youtube.com/watch?v=${videoID}', '_blank')">
                            <div class="aspect-video relative bg-slate-200">
                                <img src="https://img.youtube.com/vi/${videoID}/mqdefault.jpg" 
                                     class="w-full h-full object-cover" 
                                     loading="lazy">
                                <div class="absolute inset-0 flex items-center justify-center bg-black/5">
                                    <div class="w-7 h-7 bg-white/90 rounded-full flex items-center justify-center shadow">
                                        <i class="fas fa-play text-red-600 text-[10px] ml-0.5"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="p-1.5 bg-white text-center">
                                <p class="text-[8px] font-bold text-slate-600 line-clamp-2 leading-tight uppercase">${judul || 'Video MI Clapar'}</p>
                            </div>
                        </div>`;
                    }
                });

                const grid = document.getElementById('video-grid');
                if (html === "") {
                    grid.innerHTML = "<p class='col-span-3 text-center py-20 text-[10px] text-slate-400 font-bold uppercase'>Belum ada video di daftar.</p>";
                } else {
                    grid.innerHTML = html;
                }

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('video-grid').innerHTML = "<p class='col-span-3 text-center py-20 text-red-500 text-[10px] uppercase font-bold'>Gagal mengambil data Sheet.</p>";
            }
        }

        // Jalankan fungsi otomatis
        muatVideo();
    </script>
</body>
</html>
