<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Video MI Clapar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'sans-serif'; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50">

    <div class="bg-white p-5 sticky top-0 z-20 border-b border-slate-100 flex items-center gap-4">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 active:scale-90 transition">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="font-black text-slate-800 text-base leading-none uppercase">Galeri Video</h2>
            <p class="text-[10px] text-emerald-600 font-bold uppercase mt-1">MI Clapar Digital</p>
        </div>
    </div>

    <div id="video-grid" class="grid grid-cols-2 gap-3 p-4">
        <div class="col-span-2 py-20 text-center" id="loading">
            <i class="fas fa-circle-notch fa-spin text-emerald-500 text-2xl mb-2"></i>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Memuat Video...</p>
        </div>
    </div>

    <script>
        // Ganti dengan URL CSV Google Sheet Bapak
        const SHEET_URL = "URL_CSV_GOOGLE_SHEET_BAPAK_DI_SINI";

        async function muatVideo() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                // Pecah data per baris, buang baris judul (slice 1)
                const rows = data.split('\n').slice(1);
                
                let html = "";
                rows.forEach(row => {
                    const c = row.split(','); // Sesuaikan pemisah jika perlu
                    const url = c[4]; // Misal link YouTube di kolom E (index 4)
                    const judul = c[1]; // Misal judul di kolom B (index 1)

                    if (url && url.includes('http')) {
                        // Ambil ID Video otomatis
                        const videoID = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                        
                        html += `
                        <div class="bg-white rounded-[25px] overflow-hidden border border-slate-100 shadow-sm active:scale-95 transition" onclick="window.open('https://youtube.com/watch?v=${videoID}', '_blank')">
                            <div class="aspect-video relative">
                                <img src="https://img.youtube.com/vi/${videoID}/mqdefault.jpg" class="w-full h-full object-cover">
                                <div class="absolute inset-0 flex items-center justify-center bg-black/10">
                                    <div class="w-9 h-9 bg-white/90 rounded-full flex items-center justify-center shadow-lg">
                                        <i class="fas fa-play text-red-600 text-xs ml-0.5"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="p-3">
                                <p class="text-[10px] font-black text-slate-700 line-clamp-2 leading-tight uppercase">${judul}</p>
                            </div>
                        </div>`;
                    }
                });

                document.getElementById('video-grid').innerHTML = html || "<p class='col-span-2 text-center text-xs'>Video tidak ditemukan.</p>";
            } catch (error) {
                console.error(error);
                document.getElementById('video-grid').innerHTML = "<p class='col-span-2 text-center text-red-500 text-xs'>Gagal memuat data.</p>";
            }
        }

        // Jalankan fungsi saat halaman dibuka
        muatVideo();
    </script>
</body>
</html>
